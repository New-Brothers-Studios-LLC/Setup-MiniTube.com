
<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>miniTube | Premium Access</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        tube: {
                            base: '#050507',
                            surface: '#0f0f13',
                            accent: '#8b5cf6',
                            pink: '#ec4899'
                        }
                    },
                    animation: {
                        'slow-spin': 'spin 10s linear infinite',
                        'float': 'float 5s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-15px)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #050507;
            color: #ffffff;
            overflow-x: hidden;
        }

        .bg-noise {
            position: fixed;
            inset: 0;
            z-index: 9999;
            pointer-events: none;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        .glass {
            background: rgba(20, 20, 25, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .video-card {
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .video-card:hover {
            transform: scale(1.03) translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 20px rgba(139, 92, 246, 0.2);
        }

        input::placeholder { color: rgba(255,255,255,0.3); }

        .hide-app { display: none !important; }
        
        .glow-text {
            text-shadow: 0 0 15px rgba(139, 92, 246, 0.5);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div class="bg-noise"></div>

    <!-- PANTALLA DE LOGIN -->
    <div id="login-screen" class="fixed inset-0 z-[1000] flex items-center justify-center p-6 bg-tube-base">
        <!-- Decoración de fondo -->
        <div class="absolute w-[500px] h-[500px] bg-purple-600/10 blur-[120px] rounded-full animate-slow-spin"></div>
        
        <div class="glass w-full max-w-md p-10 rounded-[2.5rem] shadow-2xl relative z-10 text-center animate-float">
            <div class="w-16 h-16 bg-gradient-to-tr from-purple-600 to-pink-500 rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-lg shadow-purple-600/30">
                <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </div>
            <h1 class="text-4xl font-extrabold mb-2 tracking-tighter">mini<span class="text-purple-500">Tube</span></h1>
            <p class="text-gray-400 text-sm mb-8">Acceso exclusivo para miembros premium</p>
            
            <div class="space-y-4">
                <div class="relative">
                    <input type="text" id="username" placeholder="Usuario" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-purple-500 transition-all text-white">
                </div>
                <div class="relative">
                    <input type="password" id="password" placeholder="Contraseña" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-purple-500 transition-all text-white">
                </div>
                <button onclick="handleLogin()" class="w-full bg-white text-black font-extrabold py-4 rounded-2xl hover:bg-purple-500 hover:text-white transition-all duration-300 transform active:scale-95 shadow-xl">
                    ENTRAR AHORA
                </button>
            </div>
            <p id="error-msg" class="text-pink-500 text-xs mt-4 opacity-0 transition-opacity">Credenciales incorrectas. Intenta de nuevo.</p>
        </div>
    </div>

    <!-- APP PRINCIPAL (OCULTA POR DEFECTO) -->
    <div id="main-app" class="hide-app">
        <!-- Navbar -->
        <nav class="fixed top-0 w-full z-50 p-4 md:p-6">
            <div class="max-w-[1600px] mx-auto glass rounded-[2rem] p-4 px-8 flex items-center justify-between shadow-2xl">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-purple-600 rounded-lg flex items-center justify-center">
                         <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </div>
                    <span class="text-2xl font-black tracking-tighter glow-text">mini<span class="text-purple-500">Tube</span></span>
                </div>
                
                <div class="hidden md:flex gap-6 text-sm font-semibold text-gray-400">
                    <a href="#" class="text-white">Inicio</a>
                    <a href="#" class="hover:text-white">Tendencias</a>
                    <a href="#" class="hover:text-white">Favoritos</a>
                </div>

                <div class="flex items-center gap-4">
                    <span id="user-display" class="hidden sm:block text-xs font-bold text-purple-400 uppercase tracking-widest bg-purple-500/10 px-3 py-1 rounded-full">User</span>
                    <button onclick="location.reload()" class="text-xs text-gray-500 hover:text-white underline">Salir</button>
                </div>
            </div>
        </nav>

        <main class="pt-32 px-6 max-w-[1600px] mx-auto">
            <!-- Grid de Videos -->
            <div id="video-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                <!-- Se llena dinámicamente -->
            </div>
        </main>
    </div>

    <!-- MODAL REPRODUCTOR -->
    <div id="player-modal" class="fixed inset-0 z-[2000] hidden items-center justify-center p-4 sm:p-8">
        <div class="absolute inset-0 bg-black/95 backdrop-blur-2xl" onclick="closePlayer()"></div>
        <div class="relative w-full max-w-5xl glass rounded-[2.5rem] overflow-hidden shadow-2xl transition-all duration-500" id="modal-box">
            <div class="aspect-video bg-black relative">
                <video id="video-player" class="w-full h-full" controls playsinline></video>
                <button onclick="closePlayer()" class="absolute top-4 right-4 bg-white/10 hover:bg-white/20 p-2 rounded-full backdrop-blur-md">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="p-8">
                <h2 id="modal-title" class="text-2xl font-bold glow-text">Título</h2>
                <div class="flex items-center gap-4 mt-4">
                    <div class="w-12 h-12 rounded-full bg-gradient-to-tr from-purple-600 to-pink-500 p-[2px]">
                        <div class="w-full h-full rounded-full bg-tube-surface flex items-center justify-center font-bold">MT</div>
                    </div>
                    <div>
                        <p class="font-bold">miniTube Official</p>
                        <p class="text-xs text-gray-500">Suscrito • 2026</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- BASE DE DATOS DE USUARIOS PERMITIDOS ---
        const USERS = {
            "Jonathan7612": "JONATHAN56138",
            "Kathya2095": "gataxdgata",
            "Andersxn": "ANDERSXN9182",

        };

        // --- PAQUETES DE VIDEOS (40 ESPACIOS) ---
        // Deja el url vacío "" si no quieres que el recuadro aparezca.
        const VIDEOS = [
            { id: 1, title: "Video de Prueba 01", url: "https://www.w3schools.com/html/mov_bbb.mp4", thumb: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=800" },
            { id: 2, title: "Naturaleza Zen", url: "https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4", thumb: "https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=800" },
            { id: 3, title: "", url: "", thumb: "" }, // No aparecerá
            { id: 4, title: "", url: "", thumb: "" },

        // --- LÓGICA DE LOGIN ---
        function handleLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const err = document.getElementById('error-msg');

            if (USERS[u] && USERS[u] === p) {
                document.getElementById('login-screen').classList.add('hide-app');
                document.getElementById('main-app').classList.remove('hide-app');
                document.getElementById('user-display').innerText = u;
                renderVideos();
            } else {
                err.style.opacity = '1';
                setTimeout(() => err.style.opacity = '0', 3000);
            }
        }

        // --- RENDERIZADO DE VIDEOS ---
        function renderVideos() {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = '';

            // Solo filtramos los que tengan URL
            const validVideos = VIDEOS.filter(v => v.url && v.url.trim() !== "");

            validVideos.forEach((v, i) => {
                const card = document.createElement('div');
                card.className = `video-card glass rounded-[2rem] overflow-hidden cursor-pointer opacity-0`;
                card.style.animation = `fadeInUp 0.6s ease forwards ${i * 0.1}s`;
                
                card.innerHTML = `
                    <div class="relative aspect-video">
                        <img src="${v.thumb || 'https://images.unsplash.com/photo-1614850523296-e8c0a003932f?w=800'}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity">
                            <div class="w-14 h-14 bg-white rounded-full flex items-center justify-center text-black">
                                <svg class="w-6 h-6 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            </div>
                        </div>
                    </div>
                    <div class="p-6">
                        <h3 class="font-bold text-lg leading-tight line-clamp-2">${v.title || "Video sin título"}</h3>
                        <p class="text-xs text-gray-500 mt-2 uppercase tracking-tighter">Premium Content • 4K</p>
                    </div>
                `;
                card.onclick = () => openPlayer(v);
                grid.appendChild(card);
            });
        }

        // --- REPRODUCTOR ---
        const modal = document.getElementById('player-modal');
        const player = document.getElementById('video-player');

        function openPlayer(v) {
            document.getElementById('modal-title').innerText = v.title;
            player.src = v.url;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            player.play();
        }

        function closePlayer() {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            player.pause();
            player.src = "";
        }

        // Animación CSS extra inyectada
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes fadeInUp {
                from { opacity: 0; transform: translateY(30px); }
                to { opacity: 1; transform: translateY(0); }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
